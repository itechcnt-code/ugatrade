<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UgaTrade | Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <a href="#" class="admin-logo">
                <i class="fa-solid fa-shield-halved"></i>
                <span>UgaAdmin</span>
            </a>
            <nav class="admin-nav">
                <a href="#dashboard" class="admin-nav-item active">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#vendors" class="admin-nav-item">
                    <i class="fa-solid fa-users-gear"></i>
                    <span>Vendor Approval</span>
                </a>
                <a href="#products" class="admin-nav-item">
                    <i class="fa-solid fa-box-archive"></i>
                    <span>Moderation</span>
                </a>
                <a href="#messages" class="admin-nav-item" id="adminMessagesLink">
                    <i class="fa-solid fa-message"></i>
                    <span>Messages</span>
                </a>
            </nav>
            <div style="margin-top: auto;">
                <a href="../index.html" class="admin-nav-item">
                    <i class="fa-solid fa-arrow-left-long"></i>
                    <span>Exit Admin</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main" id="adminMain">
            <!-- Content injected by admin.js -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/store.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
