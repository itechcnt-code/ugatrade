<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2596be">
    <title>UgaTrade - Global Marketplace</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- html2pdf for Invoice/Receipt Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        <!-- Navigation -->
        <nav class="glass-nav">
            <div class="nav-content container">
                <a href="#home" class="logo">
                    <span class="logo-icon"><i class="fa-solid fa-basket-shopping"></i></span>
                    <span class="text-gradient">UgaTrade</span>
                </a>

                <div class="search-bar hide-mobile">
                    <input type="text" id="searchInput" placeholder="Search for products, electronics, health...">
                    <button class="search-btn"><i class="fa-solid fa-search"></i></button>
                </div>

                <div class="nav-actions" id="navActions">
                    <!-- dynamically populated by auth.js -->
                </div>

                <button class="menu-toggle" id="menuToggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>

        <!-- Mobile Drawer -->
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <div class="mobile-drawer" id="mobileDrawer">
            <div class="d-flex justify-between align-center">
                <div class="d-flex align-center gap-2">
                    <h3 class="text-gradient" style="margin: 0;">UgaTrade</h3>
                    <div id="drawerLogoutContainer"></div>
                </div>
                <button class="btn" style="padding: 0; font-size: 1.5rem;" id="closeDrawer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="mobile-search mt-2 show-mobile">
                <div class="search-bar" style="margin: 0; max-width: 100%;">
                    <input type="text" id="mobileSearchInput" placeholder="Search products...">
                    <button class="search-btn"><i class="fa-solid fa-search"></i></button>
                </div>
            </div>

            <div class="drawer-categories-section mt-2">
                <div id="drawerCategoryList">
                    <!-- dynamically populated -->
                </div>
            </div>

            <nav class="drawer-links">
                <ul id="mobileDrawerLinks">
                    <!-- dynamically populated -->
                </ul>
            </nav>
        </div>

        <!-- Dynamic View Container -->
        <main id="view-container" class="main-content">
            <!-- Views injected via JS -->
        </main>

        <footer class="glass-footer">
            <div class="container footer-content">
                <div class="footer-contact-horizontal">
                    <a href="#terms">Terms & Conditions</a>
                    <a href="mailto:support.ugatrade@gmail.com">Email: support.ugatrade@gmail.com</a>
                    <a href="javascript:app.startChat('admin')">Contact Support</a>
                    <a href="admin/index.html" style="opacity: 0.5; font-size: 0.8rem;">Admin Panel</a>
                </div>
            </div>
        </footer>

        <!-- Persistent Bottom Navigation (Mobile Only) -->
        <nav class="bottom-nav hide-desktop" id="bottomNav">
            <div class="bottom-nav-container">
                <a href="#home" class="nav-item active" data-view="home">
                    <div class="nav-icon-wrapper">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <span>Home</span>
                </a>
                <a href="javascript:void(0)" class="nav-item" id="bottomDrawerBtn" data-view="shop">
                    <div class="nav-icon-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <span>Search</span>
                </a>
                <div class="nav-item-centered">
                    <a href="#add-product" class="sell-btn-circle" id="bottomSellBtn">
                        <i class="fa-solid fa-plus"></i>
                    </a>
                    <span class="sell-label">Sell</span>
                </div>
                <a href="javascript:void(0)" class="nav-item" id="inboxBtn">
                    <div class="nav-icon-wrapper">
                        <i class="fa-solid fa-message"></i>
                    </div>
                    <span>Inbox</span>
                </a>
                <a href="#profile" class="nav-item" data-view="profile" id="profileBtn">
                    <div class="nav-icon-wrapper">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <span>Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
